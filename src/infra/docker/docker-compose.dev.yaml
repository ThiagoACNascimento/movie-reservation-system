services:
  database-dev:
    image: postgres:16-alpine
    container_name: movie-reservation-dev-db
    restart: unless-stopped
    env_file:
      - ../../../.env.development
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - movie-dev-network

  redis:
    image: redis
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - 6379:6379
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  movie-dev-network:
    name: movie-dev-network
